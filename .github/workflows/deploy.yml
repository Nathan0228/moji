name: Deploy MoJi

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 拉取当前仓库代码
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 远程部署
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}

          script: |
            set -e

            echo "进入项目目录..."
            cd /opt/moji

            echo "拉取最新代码..."
            git fetch --all
            git reset --hard origin/main

            echo "生成 .env..."

            cat > .env <<EOF
            MYSQL_HOST=${{ secrets.MYSQL_HOST }}
            MYSQL_PORT=${{ secrets.MYSQL_PORT }}
            MYSQL_USER=${{ secrets.MYSQL_USER }}
            MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
            MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
            MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}

            JWT_SECRET=${{ secrets.JWT_SECRET }}

            APP_BASE_URL=${{ secrets.APP_BASE_URL }}

            ALIYUN_OSS_ENDPOINT=${{ secrets.ALIYUN_OSS_ENDPOINT }}
            ALIYUN_OSS_BUCKET=${{ secrets.ALIYUN_OSS_BUCKET }}
            ALIYUN_OSS_ACCESS_KEY_ID=${{ secrets.ALIYUN_OSS_ACCESS_KEY_ID }}
            ALIYUN_OSS_ACCESS_KEY_SECRET=${{ secrets.ALIYUN_OSS_ACCESS_KEY_SECRET }}
            ALIYUN_OSS_BASE_URL=${{ secrets.ALIYUN_OSS_BASE_URL }}
            EOF

            echo "停止旧容器..."
            docker compose down

            echo "构建并启动..."
            docker compose up -d --build

            echo "清理无用镜像..."
            docker image prune -af

            echo "部署完成"