<!DOCTYPE html>
<html lang="zh-CN">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  >

  <title>书法名家 - 墨迹</title>

  <link
    rel="stylesheet"
    href="../css/style.css"
  >

</head>

<body class="calligrapher-page">

<div class="paper-bg"></div>

<header class="simple-header">

  <a
    href="../discovery.html"
    class="back-btn"
  >
    ←
  </a>

  <h2>书法名家</h2>

  <div></div>

</header>

<main class="calligrapher-container">

  <!-- 人物卡片 -->

  <section class="master-card">

    <img
      id="masterAvatar"
      class="master-avatar"
      src=""
      alt=""
    >

    <h1 id="masterName"></h1>

    <p
      id="masterDynasty"
      class="master-dynasty"
    ></p>

  </section>

  <!-- 简介 -->

  <section class="section-card">

    <h3>人物简介</h3>

    <p
      id="masterIntro"
      class="master-text"
    ></p>

  </section>

  <!-- 时间线 -->

  <section class="section-card">

    <h3>生平经历</h3>

    <div
      id="masterTimeline"
      class="master-timeline"
    ></div>

  </section>

  <!-- 特点 -->

  <section class="section-card">

    <h3>书法特点</h3>

    <div
      id="masterFeatures"
      class="feature-tags"
    ></div>

  </section>

  <!-- 代表作品 -->

  <section class="section-card">

    <h3>代表作品</h3>

    <div
      id="masterWorks"
      class="master-works"
    ></div>

  </section>

  <!-- 名言 -->

  <section class="section-card">

    <h3>书论摘录</h3>

    <blockquote
      id="masterQuote"
      class="master-quote"
    ></blockquote>

  </section>

  <!-- 历史评价 -->

  <section class="section-card">

    <h3>历史评价</h3>

    <p
      id="masterComment"
      class="master-text"
    ></p>

  </section>

</main>

<script src="./js/calligrapher.js"></script>

</body>

</html>
